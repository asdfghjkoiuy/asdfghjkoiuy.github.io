        <p>
          响应式页面不是把元素缩小就结束，而是要保证内容层级、图片比例、按钮尺寸和阅读节奏在不同屏幕上都舒服。
        </p>
        <p>
          这篇文章可以放你对 CSS Grid、媒体查询、图片裁切和移动端检查的总结。
        </p>
        <h2>检查清单</h2>
        <p>
          没有横向滚动，图片加载正常，标题不挤压，按钮可点击区域足够，导航在手机宽度下仍然清楚。
        </p>
